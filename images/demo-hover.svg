<svg width="840" height="500" viewBox="0 0 840 500" xmlns="http://www.w3.org/2000/svg" font-family="'SF Mono', 'Fira Code', monospace">
  <!-- Background -->
  <rect width="840" height="500" fill="#0d1117"/>

